<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Iganze Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #151515;
            --bg-tertiary: #1a1a1a;
            --accent-primary: #00ff88;
            --accent-secondary: #00cc6a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #707070;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 255, 136, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 204, 106, 0.03) 0%, transparent 50%);
            animation: backgroundPulse 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes backgroundPulse {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-2%, -2%) scale(1.02); }
        }

        .header {
            background: rgba(21, 21, 21, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }

        .brand-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .header h1 span { color: var(--accent-primary); }

        .header-buttons { display: flex; gap: 12px; }

        .refresh-btn, .logout-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
            font-weight: 600;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 68, 68, 0.5);
            color: #ff6b6b;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: #ff4444;
            color: #ff4444;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px; }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            width: 60px; height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-icon.total { background: rgba(0, 255, 136, 0.15); color: var(--accent-primary); }
        .stat-icon.today { background: rgba(0, 204, 106, 0.15); color: var(--accent-secondary); }

        .stat-info h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-info .value { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); }

        .loading {
            text-align: center;
            padding: 60px 40px;
            color: var(--accent-primary);
            font-size: 1.1rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid var(--accent-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            text-align: center;
            padding: 24px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 12px;
            color: #ff6b6b;
            margin-bottom: 30px;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .registrations-list { display: flex; flex-direction: column; gap: 24px; }

        .registration-card {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .registration-card:hover {
            border-color: rgba(0, 255, 136, 0.3);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.08), rgba(0, 204, 106, 0.05));
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .card-title-group { display: flex; align-items: center; gap: 16px; }

        .card-avatar {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--bg-primary);
        }

        .card-title { font-weight: 600; font-size: 1.15rem; color: var(--text-primary); }
        .card-title .title-prefix { color: var(--text-muted); font-weight: 400; margin-right: 4px; }

        .card-date {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--accent-primary);
            background: rgba(0, 255, 136, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
        }

        .card-body { padding: 28px; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }

        .info-item {
            background: var(--bg-tertiary);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .info-item:hover {
            border-color: rgba(0, 255, 136, 0.2);
            background: rgba(26, 26, 26, 0.9);
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-label::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent-primary);
            border-radius: 50%;
        }

        .info-value { font-size: 0.95rem; color: var(--text-primary); font-weight: 500; }

        .profile-section { grid-column: 1 / -1; margin-top: 8px; padding-top: 20px; border-top: 1px solid var(--border); }

        .profile-image-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .profile-image {
            width: 100px; height: 100px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .profile-info { flex: 1; }
        .profile-info .info-label { margin-bottom: 8px; }
        .profile-info .info-value { font-size: 1rem; color: var(--accent-primary); }

        .no-data { text-align: center; padding: 80px 40px; color: var(--text-muted); }
        .no-data-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
        .no-data h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text-secondary); }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; flex-direction: column; gap: 16px; }
            .container { padding: 20px; }
            .stats-container { grid-template-columns: 1fr; }
            .card-header { flex-direction: column; gap: 12px; text-align: center; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-brand">
            <div class="brand-icon">💍</div>
            <h1>Iganze <span>Protocol</span></h1>
        </div>
        <div class="header-buttons">
            <button class="refresh-btn" onclick="loadRegistrations()">↻ Refresh</button>
            <button class="logout-btn" onclick="logout()">← Logout</button>
        </div>

    <div class="container">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon total">📋</div>
                <div class="stat-info">
                    <h3>Total Registrations</h3>
                    <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon today">📅</div>
                <div class="stat-info">
                    <h3>Today's Registrations</h3>
                    <div class="value" id="todayCount">0</div>
            </div>

        <div class="section-header">
            <h2 class="section-title">Recent Registrations</h2>
        </div>

        <div id="loading" class="loading">Loading registrations</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="registrations" class="registrations-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA2u3jsutbNafWDY3CE-J6XnpTdjD5Cjw0",
            authDomain: "iganzeprotocol-form.firebaseapp.com",
            projectId: "iganzeprotocol-form",
            storageBucket: "iganzeprotocol-form.firebasestorage.app",
            messagingSenderId: "468067088842",
            appId: "1:468067088842:web:6257e3abf04cd909f07733"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        loadRegistrations();

        async function loadRegistrations() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const registrationsEl = document.getElementById('registrations');
            const totalCountEl = document.getElementById('totalCount');
            const todayCountEl = document.getElementById('todayCount');

            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            registrationsEl.innerHTML = '';

            try {
                const snapshot = await db.collection('registrations').orderBy('timestamp', 'desc').get();

                loadingEl.style.display = 'none';

                if (totalCountEl) totalCountEl.textContent = snapshot.size;
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                let todayCount = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.timestamp) {
                        try {
                            const regDate = data.timestamp.toDate();
                            regDate.setHours(0, 0, 0, 0);
                            if (regDate.getTime() === today.getTime()) {
                                todayCount++;
                            }
                        } catch (e) {}
                    }
                });
                if (todayCountEl) todayCountEl.textContent = todayCount;

                if (snapshot.empty) {
                    registrationsEl.innerHTML = '<div class="no-data"><div class="no-data-icon">📭</div><h3>No registrations yet</h3><p>New registrations will appear here</p></div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = createRegistrationCard(doc.id, data);
                    registrationsEl.appendChild(card);
                });

            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.textContent = 'Error loading registrations: ' + error.message;
                errorEl.style.display = 'block';
                console.error('Error:', error);
            }
        }

        function createRegistrationCard(id, data) {
            const card = document.createElement('div');
            card.className = 'registration-card';

            let timestamp = 'N/A';
            if (data.timestamp) {
                try {
                    timestamp = data.timestamp.toDate().toLocaleString('en-US', {
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                } catch (e) {
                    timestamp = data.submissionDate || 'N/A';
                }
            } else if (data.submissionDate) {
                timestamp = data.submissionDate;
            }

            const initials = getInitials(data.fullName || '');

            let profileSectionHtml = '';
            if (data.hasImage && data.profileImage) {
                profileSectionHtml = '<div class="profile-section"><div class="profile-image-wrapper"><img src="' + data.profileImage + '" alt="Profile" class="profile-image"><div class="profile-info"><div class="info-label">Profile Image</div><div class="info-value">Attached</div></div>';
            }

            card.innerHTML = '<div class="card-header"><div class="card-title-group"><div class="card-avatar">' + initials + '</div><div class="card-title"><span class="title-prefix">' + (data.title || '') + '</span>' + (data.fullName || 'Unknown') + '</div><div class="card-date">📅 ' + timestamp + '</div><div class="card-body"><div class="info-grid"><div class="info-item"><div class="info-label">Email</div><div class="info-value">' + (data.email || 'N/A') + '</div><div class="info-item"><div class="info-label">Phone</div><div class="info-value">' + (data.phone || 'N/A') + '</div><div class="info-item"><div class="info-label">Purpose</div><div class="info-value">' + (data.purpose || 'N/A') + '</div><div class="info-item"><div class="info-label">Address</div><div class="info-value">' + (data.address || 'N/A') + '</div><div class="info-item"><div class="info-label">Gender</div><div class="info-value">' + (data.gender || 'N/A') + '</div><div class="info-item"><div class="info-label">Date of Birth</div><div class="info-value">' + (data.dob || 'N/A') + '</div><div class="info-item"><div class="info-label">ID Number</div><div class="info-value">' + (data.idNumber || 'N/A') + '</div><div class="info-item"><div class="info-label">Experience</div><div class="info-value">' + (data.experienceRating || 'N/A') + '</div><div class="info-item"><div class="info-label">Registration Date</div><div class="info-value">' + (data.registrationDate || 'N/A') + '</div>' + profileSectionHtml + '</div>';

            return card;
        }

        function getInitials(name) {
            if (!name) return '?';
            const parts = name.trim().split(' ');
            if (parts.length >= 2) {
                return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
            }
            return name.substring(0, 2).toUpperCase();
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminLoginTime');
            window.location.href = 'admin-login.html';
        }
    </script>
</body>
</html>
