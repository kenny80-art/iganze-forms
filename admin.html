<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Iganze Protocol</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Link the external CSS -->
    <link rel="stylesheet" href="admin.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>

<body>

    <div class="page-wrapper">

        <!-- ░░ NAVBAR ░░ -->
        <nav class="navbar">
            <div class="container">
                <div class="navbar-inner">
                    <div class="brand">
                        <div class="brand-logo">💍</div>
                        <span class="brand-name">Iganze <span>Protocol</span></span>
                        <span class="brand-badge">Records Dept</span>
                    </div>

                    <div class="nav-actions">
                        <button class="btn btn-ghost" onclick="loadRegistrations()">
                            <span class="btn-icon">↻</span> Refresh
                        </button>
                        <button class="btn btn-danger" onclick="logout()">
                            <span class="btn-icon">⎋</span> Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- ░░ MAIN ░░ -->
        <main class="main">
            <div class="container">

                <!-- Page Title -->
                <div class="page-title-row">
                    <div>
                        <h1 class="page-title">Submitted Documents</h1>
                        <p class="page-subtitle">Official repository of client registrations and records</p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon-wrap">📋</div>
                        <div class="stat-body">
                            <div class="stat-label">Total Documents Processed</div>
                            <div class="stat-value" id="totalCount">—</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrap">📅</div>
                        <div class="stat-body">
                            <div class="stat-label">Documents Authored Today</div>
                            <div class="stat-value" id="todayCount">—</div>
                        </div>
                    </div>
                </div>

                <!-- Section header -->
                <div class="section-header">
                    <h2 class="section-title">
                        Registration Logs
                        <span class="count-badge" id="countBadge">—</span>
                    </h2>
                </div>

                <!-- Loading -->
                <div id="loadingState" class="state-box loading-state">
                    <div class="spinner"></div>
                    <p class="loading-text">Retrieving secure documents…</p>
                </div>

                <!-- Error -->
                <div id="errorState" class="state-box error-state" style="display:none;"></div>

                <!-- Registrations list -->
                <div id="registrations" class="registrations-list" style="display:none;"></div>

            </div>
        </main>

        <!-- ░░ FOOTER ░░ -->
        <footer class="page-footer">
            <div class="container">
                Iganze Protocol Admin &mdash; Authorized Personnel Only
            </div>
        </footer>

    </div><!-- /page-wrapper -->

    <!-- ░░ EDIT MODAL ░░ -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Modify Form Record</div>
                <button class="btn-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label class="form-label">Full Legal Name</label>
                    <input type="text" id="edit-fullName" class="form-control">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Electronic Mail</label>
                    <input type="email" id="edit-email" class="form-control">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Primary Contact</label>
                    <input type="text" id="edit-phone" class="form-control">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Declared Purpose</label>
                    <input type="text" id="edit-purpose" class="form-control">
                </div>

                <div class="form-group">
                    <label class="form-label">Identification Number</label>
                    <input type="text" id="edit-idNumber" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdits()">Apply Amendments</button>
            </div>
        </div>
    </div>

    <!-- Link the external JS -->
    <script src="admin.js"></script>

</body>
</html>
